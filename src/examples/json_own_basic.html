<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/style.css">
    <script async src="{TD_URL}/js/website-integration.js" referrerpolicy="origin" data-td-api="{TD_URL}/api"

    <script>
        const td_open_1variant = () => {
            console.log("Opening Tron Designer...");
            const td = window.tronDesigner;
            td.openDesigner({
                "openMode": "Create",
                "dataMode": "Own",
                "printJob": {
                    "addPrintings": [],
                    "addProducts": {
                        "supplierCode": "MY_SHOP",
                        "model": {
                            "modelCode": "MUG-01",
                            "title": "Custom Ceramic Mug",
                            "description": "A customized 11oz ceramic mug",
                            "dimensionsCount": 1,
                            "isDimension1Color": true
                        },
                        "variants": [
                            {
                                "productCode": "MUG-01-RED",
                                "dimension1Title": "Red",
                                "dimension1Colors": ["#FF0000"],
                                "overrides": {
                                    "productName": "Ceramic Mug - Red",
                                    "productCode": "MUG-01-RED"
                                }
                            },
                        ]
                    }
                }
            }, { mode: "dialog" });
        }
